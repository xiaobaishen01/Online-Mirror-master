compatibility_date = "2024-01-01"

[[routes]]
pattern = "online.a-i.indevs.in"
custom_domain = true

[[r2_buckets]]
binding = "PHOTO_BUCKET"
bucket_name = "photos"

[assets]
directory = "."
binding = "ASSETS"

[[kv_namespaces]]
binding = "KV_DATABASE"
id = "52883098d01f48619a42fb7ff59844a1"

[vars]
WHITELIST_IP = "149.104.139.142" # 多个 IP 请用英文逗号分隔，例如 "1.1.1.1, 2.2.2.2"
